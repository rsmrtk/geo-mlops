name: ML Train

on:
  workflow_dispatch:
    inputs:
      promote:
        description: "Promote to Production after training?"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Sync GCS secret
        run: |
          kubectl create secret generic mlflow-gcs-key \
            -n geo-mlops \
            --from-literal=key.json="$(echo "${{ secrets.MLFLOW_GCS_KEY_B64 }}" | base64 -d)" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Delete old job
        run: kubectl delete job ml-train -n geo-mlops --ignore-not-found

      - name: Submit training job
        run: |
          kubectl apply -f - <<EOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ml-train
            namespace: geo-mlops
          spec:
            ttlSecondsAfterFinished: 3600
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: trainer
                    image: ghcr.io/rsmrtk/geo-mlops-ml:latest
                    command: ["python", "-m", "training.train"]
                    env:
                      - name: MLFLOW_TRACKING_URI
                        value: "http://mlflow:5000"
                      - name: MODEL_NAME
                        value: "location-classifier"
                    resources:
                      requests:
                        cpu: 500m
                        memory: 512Mi
          EOF

      - name: Wait for training to complete
        run: |
          echo "Waiting for ml-train job..."
          for i in $(seq 1 60); do
            STATUS=$(kubectl get job ml-train -n geo-mlops \
              -o jsonpath='{.status.conditions[*].type}' 2>/dev/null)
            if echo "$STATUS" | grep -q "Complete"; then
              echo "Job completed successfully"
              break
            fi
            if echo "$STATUS" | grep -q "Failed"; then
              echo "Training job FAILED. Logs:"
              kubectl logs -n geo-mlops -l job-name=ml-train --tail=100
              exit 1
            fi
            echo "[$i/60] still running..."
            sleep 10
          done
          if ! echo "$STATUS" | grep -q "Complete"; then
            echo "Timed out after 600s. Logs:"
            kubectl logs -n geo-mlops -l job-name=ml-train --tail=100
            exit 1
          fi

      - name: Show logs
        run: kubectl logs -n geo-mlops -l job-name=ml-train --tail=50

      - name: Promote to Production
        if: ${{ inputs.promote == 'true' }}
        run: |
          kubectl delete job ml-promote -n geo-mlops --ignore-not-found
          kubectl apply -f - <<EOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ml-promote
            namespace: geo-mlops
          spec:
            ttlSecondsAfterFinished: 600
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: promoter
                    image: ghcr.io/rsmrtk/geo-mlops-ml:latest
                    command: ["python", "-m", "training.promote"]
                    env:
                      - name: MLFLOW_TRACKING_URI
                        value: "http://mlflow:5000"
          EOF
          echo "Waiting for ml-promote job..."
          for i in $(seq 1 12); do
            STATUS=$(kubectl get job ml-promote -n geo-mlops \
              -o jsonpath='{.status.conditions[*].type}' 2>/dev/null)
            if echo "$STATUS" | grep -q "Complete"; then
              echo "Promote completed successfully"
              break
            fi
            if echo "$STATUS" | grep -q "Failed"; then
              echo "Promote job FAILED. Logs:"
              kubectl logs -n geo-mlops -l job-name=ml-promote --tail=100
              exit 1
            fi
            echo "[$i/12] still running..."
            sleep 10
          done
          if ! echo "$STATUS" | grep -q "Complete"; then
            echo "Timed out after 120s. Logs:"
            kubectl logs -n geo-mlops -l job-name=ml-promote --tail=100
            exit 1
          fi
          kubectl logs -n geo-mlops -l job-name=ml-promote
