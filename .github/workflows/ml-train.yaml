name: ML Train

on:
  workflow_dispatch:
    inputs:
      promote:
        description: "Promote to Production after training?"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ml/requirements.txt

      - name: Install dependencies
        run: pip install -r ml/requirements.txt

      - name: Train model
        working-directory: ml
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python -m training.train

      - name: Promote to Production
        if: ${{ inputs.promote == 'true' }}
        working-directory: ml
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python -m training.promote
