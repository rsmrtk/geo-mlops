name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: test
        run: go test ./...

  build-go:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/rsmrtk/geo-mlops
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  build-ml:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/rsmrtk/geo-mlops-ml
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ./ml
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  update-infra:
    runs-on: ubuntu-latest
    needs: [build-go, build-ml]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          repository: rsmrtk/geo-mlops-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Update image tags in prod values
        run: |
          TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          sed -i "s|tag: sha-.*|tag: ${TAG}|g" infra/envs/prod/values.yaml

      - name: Commit and push
        run: |
          TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          cd infra
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add envs/prod/values.yaml
          git diff --staged --quiet && echo "no changes" && exit 0
          git commit -m "chore: update image tags to ${TAG}"
          git push
