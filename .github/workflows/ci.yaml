name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: test
        run: go test ./...

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-infra:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: rsmrtk/geo-mlops-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Update image tag in prod values
        run: |
          TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          sed -i "s|tag: sha-.*|tag: ${TAG}|" infra/envs/prod/values.yaml

      - name: Commit and push
        run: |
          TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          cd infra
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add envs/prod/values.yaml
          git diff --staged --quiet && echo "no changes" && exit 0
          git commit -m "chore: update geocoder image tag to ${TAG}"
          git push
